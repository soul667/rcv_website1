# RCV Website Configuration File

[hero]
# Hero section slides configuration
# Images should be placed in public/assets/media/home_slides/
# You can modify this list to add/remove/reorder slides
slides = [
  { image = "home_8.jpg", alt = "RCV Lab Main Facility" },
  { image = "home_10.jpg", alt = "Research Laboratory Environment" },
  { image = "home_14.jpg", alt = "Research Laboratory Environment" },
  
  
#   { image = "home_3.jpg", alt = "Advanced Equipment and Technology" },

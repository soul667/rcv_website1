[site]
# General site settings
title = "Robotics and Computer Vision Lab"
subtitle = "RCV Lab"
description = "The Robotics and Computer Vision Lab (RCV Lab) is committed to cutting-edge research in the field of robotics."

[navigation]
# Navigation menu items
show_language_toggle = true
default_language = "en"
available_languages = ["en", "zh"]

[footer]
# Footer settings
show_footer = true
copyright_year = 2024

[contact]
# Contact information
email = "contact@rcvlab.org"
phone = "+1 (555) 123-4567"
address = "123 University Ave, Research Building"


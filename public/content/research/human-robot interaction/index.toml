color = "#22D3A5"

[description]
en = "We are interested in developing robots capable of natural interaction with human beings. This requires low-level perception (sensing, detection, recognition, tracking) and high-level understanding (prediction, interaction). We focus on two HRI scenarios: Robot Person Following (RPF) and task-aware manipulation. RPF enables a robot to persistently follow its designated person, solving occlusion and target-loss in complex environments. Task-aware manipulation refers to physically manipulating environments to fulfill tasks, using natural language instructions in unconstructed settings such as apartments and offices."
zh = "我们致力于开发能够与人自然交互的机器人系统，这需要低层感知能力（探测、识别与跟踪）和高层理解能力（行为预测与交互响应）。我们重点关注两类人机交互场景：机器人跟人（RPF）和任务感知操作。RPF 使机器人能够在复杂环境中持续、准确地跟随指定目标人物，解决遮挡与目标丢失问题；任务感知操作则是让机器人根据自然语言指令在非结构化环境（如公寓、办公室）中完成操作任务，包括任务感知抓取、操作轨迹规划和移动基座路径规划。"


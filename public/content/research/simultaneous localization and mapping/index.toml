
[meta]
title = "Simultaneous Localization And Mapping (SLAM)"
title_zh = "同步定位与建图 (SLAM)"
weight = 1
image = "/content/research/simultaneous localization and mapping/featured.mp4"
color = "#4F8EF7"

[description]
en = "SLAM is a technique for obtaining the 3D structure of an unknown environment and sensor motion in the environment. Originally proposed for autonomous robot control, SLAM-based applications have expanded to computer vision-based 3D modeling, AR/VR, and autonomous vehicles. Camera and LiDAR are the primary sensors, yielding Visual SLAM (V-SLAM) and LiDAR-based SLAM. Deep learning has further accelerated SLAM development by integrating semantic segmentation and high-level environmental understanding."
zh = "SLAM 是一种用于获取未知环境三维结构和传感器运动的技术。该技术最初为实现机器人自主控制而提出，如今广泛应用于计算机视觉三维建模、增强现实（AR）/虚拟现实（VR）及无人自主飞行器等领域。相机和激光雷达是 SLAM 的两种主要传感器，分别对应视觉 SLAM（V-SLAM）和激光雷达 SLAM。深度学习与 SLAM 的结合引入了目标检测、语义分割等高层信息，显著提升了机器人对自身运动和周围环境的理解能力。"

